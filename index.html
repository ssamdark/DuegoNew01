<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUEGO SYSTEM | 되고시스템</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="wrap">
        <header id="header">
            <div class="inner">
                <h1 class="logo"><a href="#">DUEGO SYSTEM</a></h1>
                <nav class="gnb">
                    <ul>
                        <li><a href="#">COMPANY</a></li>
                        <li><a href="#">SOLUTION</a></li>
                        <li><a href="#">R&D</a></li>
                        <li><a href="#">CONTACT</a></li>
                    </ul>
                </nav>
            </div>
        </header>

        <section class="hero-section">
            <div class="video-container">
                <video autoplay muted loop playsinline preload="auto" id="main-video">
                    <source src="video/hero_02.mp4" type="video/mp4">
                </video>
                <div class="overlay"></div>
            </div>

            <div class="hero-text-box">
                <p class="fixed-text">We Design the Future of</p>
                <div class="word-rotator">
                    <span class="is-visible">Manufacturing</span>
                    <span>Safety</span>
                    <span>Innovation</span>
                    <span>Environment</span>
                    <span>People</span>
                </div>
            </div>

            <nav class="bottom-quick-nav">
                <div class="nav-item active">
                    <span class="num">01</span>
                    <p class="name">스마트팩토리</p>
                </div>
                <div class="nav-item">
                    <span class="num">02</span>
                    <p class="name">안전보건환경</p>
                </div>
                <div class="nav-item">
                    <span class="num">03</span>
                    <p class="name">연구실안전</p>
                </div>
                <div class="nav-item">
                    <span class="num">04</span>
                    <p class="name">화학물질안전</p>
                </div>
            </nav>
        </section>
    </div>

    <script src="js/main.js"></script>
</body>

</html>
